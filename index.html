<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Box</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }

        .score-display {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 215, 0, 0.15);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .score-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.875rem;
            font-weight: 600;
        }

        .score-value {
            color: #ffd700;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .target-display {
            text-align: center;
            margin-bottom: 20px;
        }

        .target-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .target-number {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .game-board {
            position: relative;
            width: 340px;
            height: 420px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            overflow: hidden;
            cursor: crosshair;
            user-select: none;
        }

        .selection-box {
            position: absolute;
            border: 3px dashed #ffd700;
            background: rgba(255, 215, 0, 0.15);
            border-radius: 12px;
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        .coin {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            user-select: none;
        }

        .coin::before {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .coin.gold {
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            box-shadow: 
                0 4px 15px rgba(255, 215, 0, 0.4),
                inset 0 -2px 4px rgba(0, 0, 0, 0.2);
        }

        .coin.silver {
            background: linear-gradient(145deg, #e8e8e8, #b8b8b8);
            box-shadow: 
                0 4px 15px rgba(200, 200, 200, 0.4),
                inset 0 -2px 4px rgba(0, 0, 0, 0.15);
        }

        .coin.copper {
            background: linear-gradient(145deg, #ff8c42, #d4621a);
            box-shadow: 
                0 4px 15px rgba(255, 140, 66, 0.4),
                inset 0 -2px 4px rgba(0, 0, 0, 0.2);
        }

        .coin.bronze {
            background: linear-gradient(145deg, #cd7f32, #8b5a2b);
            box-shadow: 
                0 4px 15px rgba(205, 127, 50, 0.4),
                inset 0 -2px 4px rgba(0, 0, 0, 0.2);
        }

        .coin.light {
            filter: brightness(1.3);
        }

        .coin.selected {
            transform: scale(1.1);
            z-index: 5;
        }

        .coin.matched {
            animation: popOut 0.4s ease forwards;
        }

        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }

        .controls {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1a2e;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-secondary.active {
            background: rgba(255, 215, 0, 0.2);
            border-color: rgba(255, 215, 0, 0.5);
        }

        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        .message.show {
            opacity: 1;
        }

        .message.success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            box-shadow: 0 10px 40px rgba(16, 185, 129, 0.4);
        }

        .message.error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            box-shadow: 0 10px 40px rgba(239, 68, 68, 0.4);
        }

        .combo-text {
            position: absolute;
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            animation: floatUp 1s ease forwards;
            z-index: 20;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
        }

        .instructions {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🪙 Coin Box</h1>
            <div class="score-display">
                <span class="score-label">Score</span>
                <span class="score-value" id="score">0</span>
            </div>
        </div>

        <div class="target-display">
            <div class="target-text">Drag to select coins that add up to</div>
            <div class="target-number" id="target">10</div>
        </div>

        <div class="game-board" id="board">
            <div class="selection-box" id="selectionBox"></div>
        </div>

        <div class="controls">
            <button class="btn btn-secondary" id="lightBtn">Light Colors</button>
            <button class="btn btn-primary" id="resetBtn">New Game</button>
        </div>
    </div>

    <div class="message" id="message"></div>

    <div class="instructions">
        Click and drag to enclose coins. Numbers must sum to 10.
    </div>

    <script>
        const TARGET_SUM = 10;
        const GRID_COLS = 4;
        const GRID_ROWS = 5;
        const COIN_SIZE = 70;
        const PADDING = 15;

        let coins = [];
        let score = 0;
        let isDragging = false;
        let startX, startY;
        let lightColors = false;

        const board = document.getElementById('board');
        const selectionBox = document.getElementById('selectionBox');
        const scoreDisplay = document.getElementById('score');
        const targetDisplay = document.getElementById('target');
        const messageEl = document.getElementById('message');
        const lightBtn = document.getElementById('lightBtn');
        const resetBtn = document.getElementById('resetBtn');

        function getRandomValue() {
            return Math.floor(Math.random() * 9) + 1;
        }

        function getCoinClass() {
            const rand = Math.random();
            if (rand < 0.25) return 'gold';
            if (rand < 0.5) return 'silver';
            if (rand < 0.75) return 'copper';
            return 'bronze';
        }

        function createCoins() {
            board.querySelectorAll('.coin').forEach(c => c.remove());
            coins = [];

            const availablePositions = [];
            for (let row = 0; row < GRID_ROWS; row++) {
                for (let col = 0; col < GRID_COLS; col++) {
                    availablePositions.push({ row, col });
                }
            }

            // Shuffle positions
            for (let i = availablePositions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [availablePositions[i], availablePositions[j]] = [availablePositions[j], availablePositions[i]];
            }

            // Create coins with values that can sum to 10
            for (let i = 0; i < GRID_COLS * GRID_ROWS; i++) {
                const pos = availablePositions[i];
                const value = getRandomValue();
                
                const coin = document.createElement('div');
                coin.className = `coin ${getCoinClass()}${lightColors ? ' light' : ''}`;
                coin.textContent = value;
                coin.dataset.row = pos.row;
                coin.dataset.col = pos.col;
                coin.dataset.value = value;
                
                const x = PADDING + pos.col * (COIN_SIZE + 10);
                const y = PADDING + pos.row * (COIN_SIZE + 10);
                
                coin.style.left = `${x}px`;
                coin.style.top = `${y}px`;
                
                board.appendChild(coin);
                coins.push({
                    element: coin,
                    row: pos.row,
                    col: pos.col,
                    value: value,
                    x, y
                });
            }
        }

        function isInsideSelection(coin) {
            const boxRect = selectionBox.getBoundingClientRect();
            const coinRect = coin.element.getBoundingClientRect();

            const coinCenterX = coinRect.left + coinRect.width / 2;
            const coinCenterY = coinRect.top + coinRect.height / 2;

            return (
                coinCenterX >= boxRect.left &&
                coinCenterX <= boxRect.right &&
                coinCenterY >= boxRect.top &&
                coinCenterY <= boxRect.bottom
            );
        }

        function getSelectedCoins() {
            return coins.filter(coin => coin.element.classList.contains('selected'));
        }

        function sumSelected() {
            return getSelectedCoins().reduce((sum, coin) => sum + coin.value, 0);
        }

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message ${type} show`;
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 1500);
        }

        function showComboText(coinsMatched, x, y) {
            const text = document.createElement('div');
            text.className = 'combo-text';
            text.textContent = `+${coinsMatched}`;
            text.style.left = `${x}px`;
            text.style.top = `${y}px`;
            board.appendChild(text);
            setTimeout(() => text.remove(), 1000);
        }

        function clearSelection() {
            coins.forEach(coin => {
                coin.element.classList.remove('selected');
            });
            selectionBox.style.display = 'none';
        }

        function checkSelection() {
            const selected = getSelectedCoins();
            if (selected.length === 0) return;

            const sum = sumSelected();
            
            if (sum === TARGET_SUM) {
                // Success!
                const points = selected.length;
                score += points;
                scoreDisplay.textContent = score;

                let centerX = 0, centerY = 0;
                selected.forEach(coin => {
                    coin.element.classList.add('matched');
                    centerX += coin.x + COIN_SIZE / 2;
                    centerY += coin.y + COIN_SIZE / 2;
                });
                centerX /= selected.length;
                centerY /= selected.length;

                showComboText(points, centerX - 20, centerY);
                showMessage(`Perfect! +${points} points`, 'success');

                setTimeout(() => {
                    selected.forEach(coin => {
                        coin.element.remove();
                        const idx = coins.indexOf(coin);
                        if (idx > -1) coins.splice(idx, 1);
                    });
                    
                    // Spawn new coins to fill gaps
                    fillEmptySpaces();
                }, 400);
            } else {
                showMessage(sum > TARGET_SUM ? `Too high! (${sum})` : `Too low! (${sum})`, 'error');
            }

            setTimeout(clearSelection, 500);
        }

        function fillEmptySpaces() {
            const occupiedPositions = new Set(
                coins.map(c => `${c.row},${c.col}`)
            );

            let created = 0;
            for (let row = 0; row < GRID_ROWS; row++) {
                for (let col = 0; col < GRID_COLS; col++) {
                    if (!occupiedPositions.has(`${row},${col}`) && created < 3) {
                        const value = getRandomValue();
                        
                        const coin = document.createElement('div');
                        coin.className = `coin ${getCoinClass()}${lightColors ? ' light' : ''}`;
                        coin.textContent = value;
                        coin.dataset.row = row;
                        coin.dataset.col = col;
                        coin.dataset.value = value;
                        
                        const x = PADDING + col * (COIN_SIZE + 10);
                        const y = PADDING + row * (COIN_SIZE + 10);
                        
                        coin.style.left = `${x}px`;
                        coin.style.top = `${y}px`;
                        coin.style.opacity = '0';
                        coin.style.transform = 'scale(0)';
                        
                        board.appendChild(coin);
                        
                        setTimeout(() => {
                            coin.style.transition = 'opacity 0.3s, transform 0.3s';
                            coin.style.opacity = '1';
                            coin.style.transform = 'scale(1)';
                        }, 50);

                        coins.push({
                            element: coin,
                            row, col, value, x, y
                        });
                        created++;
                    }
                }
            }
        }

        function updateSelectionBox(currentX, currentY) {
            const minX = Math.min(startX, currentX);
            const minY = Math.min(startY, currentY);
            const width = Math.abs(currentX - startX);
            const height = Math.abs(currentY - startY);

            selectionBox.style.left = `${minX - board.getBoundingClientRect().left}px`;
            selectionBox.style.top = `${minY - board.getBoundingClientRect().top}px`;
            selectionBox.style.width = `${width}px`;
            selectionBox.style.height = `${height}px`;
            selectionBox.style.display = 'block';

            // Update coin selection
            coins.forEach(coin => {
                if (isInsideSelection(coin)) {
                    coin.element.classList.add('selected');
                } else {
                    coin.element.classList.remove('selected');
                }
            });
        }

        // Event listeners
        board.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('coin')) return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            clearSelection();
        });

        board.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            updateSelectionBox(e.clientX, e.clientY);
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                checkSelection();
            }
        });

        // Touch support
        board.addEventListener('touchstart', (e) => {
            if (e.target.classList.contains('coin')) return;
            e.preventDefault();
            const touch = e.touches[0];
            isDragging = true;
            startX = touch.clientX;
            startY = touch.clientY;
            clearSelection();
        }, { passive: false });

        board.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const touch = e.touches[0];
            updateSelectionBox(touch.clientX, touch.clientY);
        }, { passive: false });

        document.addEventListener('touchend', () => {
            if (isDragging) {
                isDragging = false;
                checkSelection();
            }
        });

        lightBtn.addEventListener('click', () => {
            lightColors = !lightColors;
            lightBtn.classList.toggle('active', lightColors);
            document.querySelectorAll('.coin').forEach(coin => {
                coin.classList.toggle('light', lightColors);
            });
        });

        resetBtn.addEventListener('click', () => {
            score = 0;
            scoreDisplay.textContent = '0';
            createCoins();
        });

        // Initialize
        createCoins();
    </script>
</body>
</html>
